[package]
name = "kernels"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
logic = { path = "../logic" }

[build-dependencies]
cuda_builder = { git = "https://github.com/brandonros/Rust-CUDA.git", rev = "38212ab745b6d257992e37bc0bc2b7b659bebed4", default-features = false, features = ["rustc_codegen_nvvm", "llvm19"] }

[workspace]

[patch.crates-io]
zeroize = { git = "https://github.com/brandonros/utils", rev = "4c9734e1ae4a6cb61db4693f9d164866f084ca97" }

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
