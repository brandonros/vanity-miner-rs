[package]
name = "kernels"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
logic = { path = "../logic" }
cuda_std = { git = "https://github.com/brandonros/Rust-CUDA.git", rev = "2f4fd1d" }

[workspace]

[patch.crates-io]
zeroize = { git = "https://github.com/brandonros/utils", rev = "4c9734e1ae4a6cb61db4693f9d164866f084ca97" }

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
