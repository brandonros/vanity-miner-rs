[package]
name = "vanity-miner"
version = "0.1.0"
edition = "2024"

[features]
default = []
gpu = ["dep:cust", "dep:backtrace", "dep:cuda_builder"]

[dependencies]
logic = { path = "../logic" }
clap = { version = "4", features = ["derive"] }
hex = "0.4.3"
rand = "0.8"
paste = "1.0"

[dependencies.cust]
git = "https://github.com/brandonros/Rust-CUDA.git"
rev = "07535014d4c025adbed6ab1c7a1ab4d96f76d506"
optional = true

[dependencies.backtrace]
version = "0.3"
optional = true

[build-dependencies.cuda_builder]
git = "https://github.com/brandonros/Rust-CUDA.git"
rev = "07535014d4c025adbed6ab1c7a1ab4d96f76d506"
default-features = false
features = ["rustc_codegen_nvvm", "llvm19"]
optional = true
