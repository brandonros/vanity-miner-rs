[package]
name = "vanity-miner"
version = "0.1.0"
edition = "2024"

[features]
default = []
gpu = ["dep:kernels", "dep:cuda-core", "dep:cuda-host"]

[dependencies]
logic = { path = "../logic" }
clap = { version = "4", features = ["derive"] }
hex = "0.4.3"
rand = "0.8"
paste = "1.0"

[dependencies.kernels]
path = "../kernels"
optional = true

[dependencies.cuda-core]
git = "https://github.com/brandonros/cuda-oxide.git"
rev = "990e028fc0756d3082bd1bfe41876c2cf4ce3efa"
optional = true

[dependencies.cuda-host]
git = "https://github.com/brandonros/cuda-oxide.git"
rev = "990e028fc0756d3082bd1bfe41876c2cf4ce3efa"
optional = true
