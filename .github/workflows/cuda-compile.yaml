name: cuda-compile

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-24.04
            arch: x86_64
          # - runs-on: ubuntu-24.04-arm
          #   arch: aarch64
    runs-on: ${{ matrix.runs-on }}
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ matrix.arch }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-${{ matrix.arch }}-
          purge-created: 0
          purge-primary-key: never

      - name: Build (via scripts/build-gpu.sh)
        run: |
          # Single script for CI + local debugging. Mirrors cargo-oxide's full
          # RUSTFLAGS set including -Z always-encode-mir=yes (without which
          # cross-crate pub fn calls into logic/ get dropped at the collector).
          nix develop --command bash scripts/build-gpu.sh

          mkdir -p artifacts
          cp target/release/vanity-miner ./artifacts/vanity-miner-${{ matrix.arch }}
          # kernels.ptx is host-arch-independent (nvptx64), but copy it from
          # both arch jobs so the release step can pick either one — they're
          # identical. download-artifact will merge under one name.
          cp target/ptx/kernels.ptx ./artifacts/kernels.ptx
          echo "Copied build artifacts for ${{ matrix.arch }}"

      - name: Patch ELF interpreter for portability
        run: |
          # Nix bakes a /nix/store/... interpreter path into the binary, which
          # doesn't exist on stock Ubuntu/Debian hosts. Repoint at the standard
          # system path so the binary runs on non-Nix targets.
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            INTERP=/lib64/ld-linux-x86-64.so.2
          else
            INTERP=/lib/ld-linux-aarch64.so.1
          fi
          nix develop --command patchelf --set-interpreter "$INTERP" --remove-rpath \
            ./artifacts/vanity-miner-${{ matrix.arch }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vanity-miner-${{ matrix.arch }}
          path: artifacts/

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag and calculate next version
        id: version
        run: |
          # Get the latest tag, fallback to v0.0.0 if no tags exist
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          # Extract version numbers (remove 'v' prefix if present)
          VERSION=${LATEST_TAG#v}

          # Split version into parts
          IFS='.' read -r -a VERSION_PARTS <<< "$VERSION"
          MAJOR=${VERSION_PARTS[0]:-0}
          MINOR=${VERSION_PARTS[1]:-0}
          PATCH=${VERSION_PARTS[2]:-0}

          # Increment minor version (you can change this to PATCH if you prefer patch bumps)
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="v${MAJOR}.${NEW_MINOR}.0"

          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "version_number=${NEW_VERSION#v}" >> $GITHUB_OUTPUT

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ steps.version.outputs.new_version }} -m "Release ${{ steps.version.outputs.new_version }}"
          git push origin ${{ steps.version.outputs.new_version }}

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.new_version }}
          release_name: Release ${{ steps.version.outputs.new_version }}
          body: |
            ## CUDA Vanity Miner ${{ steps.version.outputs.new_version }}

            ### Build Information
            - **Workflow**: ${{ github.workflow }}
            - **Run ID**: ${{ github.run_id }}
            - **Commit**: ${{ github.sha }}
            - **Built on**: ${{ github.event.repository.updated_at }}
          draft: false
          prerelease: false

      - name: Upload x86_64 binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/vanity-miner-x86_64/vanity-miner-x86_64
          asset_name: vanity-miner-x86_64
          asset_content_type: application/octet-stream

      # - name: Upload aarch64 binary
      #   uses: actions/upload-release-asset@v1
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #   with:
      #     upload_url: ${{ steps.create_release.outputs.upload_url }}
      #     asset_path: dist/vanity-miner-aarch64/vanity-miner-aarch64
      #     asset_name: vanity-miner-aarch64
      #     asset_content_type: application/octet-stream

      - name: Upload kernels.ptx
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/vanity-miner-x86_64/kernels.ptx
          asset_name: kernels.ptx
          asset_content_type: text/plain
